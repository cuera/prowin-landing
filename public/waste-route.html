<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Collection Route</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    background: transparent;
    padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  .wrap {
    width: 100%;
    max-width: 540px;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    background: #1e1e26;
  }
  svg { display: block; width: 100%; height: auto; }

  /*  ╔═══════════════════════════════════╗
      ║   ROUTE PATH DRAW-IN             ║
      ╚═══════════════════════════════════╝ */
  .route-draw {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: drawIn 2s cubic-bezier(.4,0,.2,1) .4s forwards;
  }
  @keyframes drawIn { to { stroke-dashoffset: 0; } }

  /*  ╔═══════════════════════════════════╗
      ║   TRUCK — 14s master loop        ║
      ╚═══════════════════════════════════╝
      Road layout:
        Full road:   x=208 → x=392  (184px)
        Left lane:   x=208 → x=298  center = 253
        Right lane:  x=302 → x=392  center = 347
        Center line: x=300
      Truck:
        Body width = 56px (internal 0→56)
        translate x = 253 - 28 = 225
        → truck spans x=225 → x=281
        → center = x=253 = LEFT LANE CENTER ✓
      Route path: x=253 (matches truck center)
  */
  .truck {
    animation: truckMove 14s ease-in-out 2.6s infinite;
  }
  @keyframes truckMove {
    0%   { transform: translateY(-220px); opacity: 0; }
    4%   { transform: translateY(-220px); opacity: 1; }
    18%  { transform: translateY(0px); }
    28%  { transform: translateY(0px); }
    48%  { transform: translateY(400px); }
    58%  { transform: translateY(400px); }
    78%  { transform: translateY(800px); opacity: 1; }
    83%  { transform: translateY(860px); opacity: 0; }
    100% { transform: translateY(-220px); opacity: 0; }
  }

  .truck-chassis {
    animation: bounce .5s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-1px); }
  }

  .wheel-roll {
    animation: wTick .25s linear infinite;
  }
  @keyframes wTick {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: 6; }
  }

  .hazard {
    animation: blink .65s ease-in-out infinite alternate;
  }
  @keyframes blink { from { opacity: .25; } to { opacity: 1; } }

  /* Factory bin pickup */
  .factory-bin-anim {
    transform-origin: center center;
    animation: fBin 14s ease-in-out 2.6s infinite;
  }
  @keyframes fBin {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    20%  { transform: translate(0,0) scale(1); opacity: 1; }
    23%  { transform: translate(18px,0) scale(1.08); opacity: 1; }
    26%  { transform: translate(18px,-20px) scale(.45); opacity: .3; }
    28%  { transform: translate(18px,-20px) scale(0); opacity: 0; }
    80%  { transform: translate(0,0) scale(0); opacity: 0; }
    86%  { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(0,0) scale(1); opacity: 1; }
  }

  /* Home bin pickup */
  .home-bin-anim {
    transform-origin: center center;
    animation: hBin 14s ease-in-out 2.6s infinite;
  }
  @keyframes hBin {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    50%  { transform: translate(0,0) scale(1); opacity: 1; }
    53%  { transform: translate(-18px,0) scale(1.08); opacity: 1; }
    56%  { transform: translate(-18px,-20px) scale(.45); opacity: .3; }
    58%  { transform: translate(-18px,-20px) scale(0); opacity: 0; }
    80%  { transform: translate(0,0) scale(0); opacity: 0; }
    86%  { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(0,0) scale(1); opacity: 1; }
  }

  .fill-1 { animation: f1 14s ease-in-out 2.6s infinite; }
  @keyframes f1 {
    0% { opacity:0; } 27% { opacity:0; } 29% { opacity:1; }
    81% { opacity:1; } 83% { opacity:0; } 100% { opacity:0; }
  }
  .fill-2 { animation: f2 14s ease-in-out 2.6s infinite; }
  @keyframes f2 {
    0% { opacity:0; } 57% { opacity:0; } 59% { opacity:1; }
    81% { opacity:1; } 83% { opacity:0; } 100% { opacity:0; }
  }

  .smoke { animation: smokeUp 3.5s ease-out infinite; opacity: 0; }
  .smoke:nth-child(2) { animation-delay: 1.2s; }
  .smoke:nth-child(3) { animation-delay: 2.4s; }
  @keyframes smokeUp {
    0%   { transform: translateY(0) scale(.5); opacity: 0; }
    12%  { opacity: .4; }
    100% { transform: translateY(-60px) scale(2.2); opacity: 0; }
  }

  .cA { animation: dA 26s linear infinite; }
  .cB { animation: dB 34s linear infinite; }
  @keyframes dA { from { transform: translateX(0); } to { transform: translateX(90px); } }
  @keyframes dB { from { transform: translateX(0); } to { transform: translateX(-70px); } }

  .ring-f { animation: rF 14s ease-out 2.6s infinite; opacity:0; transform-origin:center; }
  @keyframes rF {
    0% { opacity:0; transform:scale(.4); } 19% { opacity:0; transform:scale(.4); }
    20% { opacity:.5; transform:scale(.4); } 27% { opacity:0; transform:scale(2.8); }
    100% { opacity:0; }
  }
  .ring-h { animation: rH 14s ease-out 2.6s infinite; opacity:0; transform-origin:center; }
  @keyframes rH {
    0% { opacity:0; transform:scale(.4); } 49% { opacity:0; transform:scale(.4); }
    50% { opacity:.5; transform:scale(.4); } 57% { opacity:0; transform:scale(2.8); }
    100% { opacity:0; }
  }

  .badge-f { animation: bF 14s ease-in-out 2.6s infinite; opacity:0; }
  @keyframes bF {
    0% { opacity:0; transform:scale(.5) translateY(5px); }
    24% { opacity:0; transform:scale(.5) translateY(5px); }
    26% { opacity:1; transform:scale(1) translateY(0); }
    30% { opacity:0; transform:scale(.5) translateY(-5px); }
    100% { opacity:0; }
  }
  .badge-h { animation: bH 14s ease-in-out 2.6s infinite; opacity:0; }
  @keyframes bH {
    0% { opacity:0; transform:scale(.5) translateY(5px); }
    54% { opacity:0; transform:scale(.5) translateY(5px); }
    56% { opacity:1; transform:scale(1) translateY(0); }
    60% { opacity:0; transform:scale(.5) translateY(-5px); }
    100% { opacity:0; }
  }

  .sway { transform-origin: center bottom; animation: sw 4.5s ease-in-out infinite alternate; }
  .sway:nth-child(even) { animation-delay: -2s; animation-duration: 5.5s; }
  @keyframes sw { from { transform: rotate(-1.5deg); } to { transform: rotate(1.5deg); } }
</style>
</head>
