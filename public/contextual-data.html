<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Ecosystem Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #071519; }
  svg { display: block; width: 100%; height: 100%; }

  /* ═══════ PATH DRAW-IN ═══════ */
  .path-draw {
    stroke-dasharray: 100; stroke-dashoffset: 100; fill: none;
  }
  .p-crm    { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 1.6s forwards; }
  .p-ed     { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 2.0s forwards; }
  .p-fac    { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 2.4s forwards; }
  .p-wst    { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 2.8s forwards; }
  @keyframes drawP { to { stroke-dashoffset: 0; } }

  .path-glow {
    stroke-dasharray: 100; stroke-dashoffset: 100; fill: none; filter: blur(4px);
  }
  .g-crm { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 1.6s forwards; }
  .g-ed  { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 2.0s forwards; }
  .g-fac { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 2.4s forwards; }
  .g-wst { animation: drawP 1.8s cubic-bezier(.25,.1,.25,1) 2.8s forwards; }

  /* ═══════ NODE POP-IN (nested <g>) ═══════ */
  .node-pop { transform: scale(0); opacity: 0; transform-origin: center; }
  .n-crm { animation: nIn .65s cubic-bezier(.34,1.56,.64,1) .9s forwards; }
  .n-ed  { animation: nIn .65s cubic-bezier(.34,1.56,.64,1) 1.15s forwards; }
  .n-fac { animation: nIn .65s cubic-bezier(.34,1.56,.64,1) 1.4s forwards; }
  .n-wst { animation: nIn .65s cubic-bezier(.34,1.56,.64,1) 1.65s forwards; }
  @keyframes nIn {
    0%  { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.12); opacity: 1; }
    100%{ transform: scale(1); opacity: 1; }
  }

  .node-ring {
    transform-origin: center; animation: rPulse 3s ease-in-out infinite;
  }
  .node-ring:nth-child(2) { animation-delay: 1.5s; }
  @keyframes rPulse {
    0%  { transform: scale(1); opacity: .3; }
    50% { transform: scale(1.45); opacity: 0; }
    100%{ transform: scale(1); opacity: 0; }
  }

  /* ═══════ HUB ═══════ */
  .hub-pop {
    transform: scale(0); opacity: 0; transform-origin: center;
    animation: hIn .9s cubic-bezier(.34,1.56,.64,1) .4s forwards;
  }
  @keyframes hIn {
    0%  { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.15); opacity: 1; }
    100%{ transform: scale(1); opacity: 1; }
  }

  .hub-pulse {
    transform-origin: center;
    animation: hPulse 4s ease-in-out 3.8s infinite; opacity: 0;
  }
  @keyframes hPulse {
    0%  { transform: scale(.8); opacity: .45; }
    50% { transform: scale(1.7); opacity: 0; }
    100%{ transform: scale(.8); opacity: 0; }
  }

  .hub-rot { transform-origin: center; animation: hRot 18s linear infinite; }
  @keyframes hRot { to { transform: rotate(360deg); } }

  /* ═══════ DATA PACKETS ═══════ */
  .pkt { opacity: 0; }
  .pk-crm { animation: pkF 2.5s ease-in-out 3.8s infinite; }
  .pk-ed  { animation: pkF 2.5s ease-in-out 4.3s infinite; }
  .pk-fac { animation: pkF 2.5s ease-in-out 4.8s infinite; }
  .pk-wst { animation: pkF 2.5s ease-in-out 5.3s infinite; }
  @keyframes pkF {
    0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; }
  }

  /* ═══════ TEXT ═══════ */
  .tv { opacity: 0; }
  .tv1 { animation: fUp .7s ease-out .15s forwards; }
  .tv2 { animation: fUp .7s ease-out .35s forwards; }
  .tv3 { animation: fUp .7s ease-out 4.2s forwards; }
  .tv4 { animation: fUp .7s ease-out 4.6s forwards; }
  .tv5 { animation: fUp .7s ease-out 5s forwards; }
  @keyframes fUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ═══════ GRID ═══════ */
  .gf { opacity: 0; animation: gIn 1.5s ease-out .1s forwards; }
  @keyframes gIn { to { opacity: .1; } }

  /* ═══════ AMBIENT ═══════ */
  .ptcl { animation: drft 8s ease-in-out infinite alternate; opacity: 0; }
  .pt1 { animation-delay: 0s; } .pt2 { animation-delay: 2.5s; }
  .pt3 { animation-delay: 5s; } .pt4 { animation-delay: 1.5s; }
  @keyframes drft {
    0%  { transform: translate(0,0); opacity: .15; }
    50% { opacity: .35; }
    100%{ transform: translate(12px,-16px); opacity: .08; }
  }

  .orbit-r { fill: none; opacity: 0; transform-origin: center; }
  .or1 { animation: oIn .8s ease-out 3.3s forwards; }
  .or2 { animation: oIn .8s ease-out 3.5s forwards; }
  .or3 { animation: oIn .8s ease-out 3.7s forwards; }
  @keyframes oIn { from { opacity: 0; transform: scale(.8); } to { opacity: 1; transform: scale(1); } }

  .stat-glow { animation: sG 3s ease-in-out infinite alternate; }
  @keyframes sG { from { opacity: .7; } to { opacity: 1; } }
</style>
</head>
<body>
<svg viewBox="0 0 540 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<defs>
  <radialGradient id="hGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd54f" stop-opacity=".3"/>
    <stop offset="60%" stop-color="#ffab00" stop-opacity=".06"/>
    <stop offset="100%" stop-color="#071519" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="aGlow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity=".035"/>
    <stop offset="100%" stop-color="#071519" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grd" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#0f3844" stroke-width=".4"/>
  </pattern>
  <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>

<!-- ═══════ BG ═══════ -->
<rect width="540" height="900" fill="#071519"/>
<rect width="540" height="900" fill="url(#aGlow)"/>
<rect class="gf" width="540" height="900" fill="url(#grd)"/>

<!-- Particles -->
<circle class="ptcl pt1" cx="65" cy="280" r="1.1" fill="#00e5ff"/>
<circle class="ptcl pt2" cx="460" cy="350" r=".9" fill="#ffd54f"/>
<circle class="ptcl pt3" cx="170" cy="560" r="1" fill="#b388ff"/>
<circle class="ptcl pt4" cx="400" cy="600" r=".8" fill="#69f0ae"/>

<!-- ═══════════════════════════════════
     HEADER
     ═══════════════════════════════════ -->
<!-- Top accent line -->
<rect x="0" y="0" width="540" height="2" fill="#00e5ff" opacity=".15"/>

<!-- "Prowin" tag -->
<g class="tv tv1">
  <rect x="210" y="20" width="120" height="22" rx="11" fill="none" stroke="#134050" stroke-width="1"/>
  <text x="270" y="35" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00e5ff" font-weight="500" letter-spacing="3">PROWIN</text>
</g>

<!-- Main heading -->
<g class="tv tv2">
  <text x="270" y="76" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="20" fill="#e0f7fa" font-weight="700" letter-spacing="2.5">UNIFIED ECOSYSTEM</text>
  <text x="270" y="100" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="20" fill="#e0f7fa" font-weight="700" letter-spacing="2.5">ARCHITECTURE</text>
</g>

<!-- Decorative divider -->
<g class="tv tv2">
  <line x1="185" y1="118" x2="355" y2="118" stroke="#00e5ff" stroke-width=".4" opacity=".35"/>
  <circle cx="270" cy="118" r="1.8" fill="#00e5ff" opacity=".45"/>
  <circle cx="230" cy="118" r="1" fill="#00e5ff" opacity=".2"/>
  <circle cx="310" cy="118" r="1" fill="#00e5ff" opacity=".2"/>
</g>

<!-- ═══════════════════════════════════
     CONNECTION PATHS
     Hub: (270, 440)
     CRM:     (95, 240)
     EdTech:  (445, 270)
     Factory: (85, 640)
     Waste:   (455, 660)
     ═══════════════════════════════════ -->

<!-- Glow layers -->
<path class="path-glow g-crm" d="M 95 240 C 130 340, 220 400, 270 440" pathLength="100" stroke="#ff6b8a" stroke-width="5" opacity=".25"/>
<path class="path-glow g-ed"  d="M 445 270 C 400 350, 320 400, 270 440" pathLength="100" stroke="#b388ff" stroke-width="5" opacity=".25"/>
<path class="path-glow g-fac" d="M 85 640 C 130 560, 210 490, 270 440"  pathLength="100" stroke="#ffab40" stroke-width="5" opacity=".25"/>
<path class="path-glow g-wst" d="M 455 660 C 410 580, 330 490, 270 440" pathLength="100" stroke="#69f0ae" stroke-width="5" opacity=".25"/>

<!-- Sharp lines -->
<path id="pCRM" class="path-draw p-crm" d="M 95 240 C 130 340, 220 400, 270 440"  pathLength="100" stroke="#ff6b8a" stroke-width="1.5" opacity=".75"/>
<path id="pED"  class="path-draw p-ed"  d="M 445 270 C 400 350, 320 400, 270 440" pathLength="100" stroke="#b388ff" stroke-width="1.5" opacity=".75"/>
<path id="pFAC" class="path-draw p-fac" d="M 85 640 C 130 560, 210 490, 270 440"  pathLength="100" stroke="#ffab40" stroke-width="1.5" opacity=".75"/>
<path id="pWST" class="path-draw p-wst" d="M 455 660 C 410 580, 330 490, 270 440" pathLength="100" stroke="#69f0ae" stroke-width="1.5" opacity=".75"/>

<!-- ═══════ DATA PACKETS ═══════ -->
<g class="pkt pk-crm">
  <circle r="3.5" fill="#ff6b8a" filter="url(#gl)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="3.8s"><mpath href="#pCRM"/></animateMotion>
  </circle>
</g>
<g class="pkt pk-ed">
  <circle r="3.5" fill="#b388ff" filter="url(#gl)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="4.3s"><mpath href="#pED"/></animateMotion>
  </circle>
</g>
<g class="pkt pk-fac">
  <circle r="3.5" fill="#ffab40" filter="url(#gl)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="4.8s"><mpath href="#pFAC"/></animateMotion>
  </circle>
</g>
<g class="pkt pk-wst">
  <circle r="3.5" fill="#69f0ae" filter="url(#gl)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="5.3s"><mpath href="#pWST"/></animateMotion>
  </circle>
</g>

<!-- Second wave (smaller, offset) -->
<circle r="2" fill="#ff6b8a" opacity=".45">
  <animateMotion dur="3.2s" repeatCount="indefinite" begin="5s"><mpath href="#pCRM"/></animateMotion>
</circle>
<circle r="2" fill="#b388ff" opacity=".45">
  <animateMotion dur="3.2s" repeatCount="indefinite" begin="5.5s"><mpath href="#pED"/></animateMotion>
</circle>
<circle r="2" fill="#ffab40" opacity=".45">
  <animateMotion dur="3.2s" repeatCount="indefinite" begin="6s"><mpath href="#pFAC"/></animateMotion>
</circle>
<circle r="2" fill="#69f0ae" opacity=".45">
  <animateMotion dur="3.2s" repeatCount="indefinite" begin="6.5s"><mpath href="#pWST"/></animateMotion>
</circle>

<!-- ═══════════════════════════════════
     CENTRAL HUB — (270, 440)
     Outer=position, Inner=animation
     ═══════════════════════════════════ -->
<circle cx="270" cy="440" r="100" fill="url(#hGlow)" opacity=".55"/>

<!-- Pulse rings -->
<circle class="hub-pulse" cx="270" cy="440" r="48" fill="none" stroke="#ffd54f" stroke-width=".8"/>
<circle class="hub-pulse" cx="270" cy="440" r="48" fill="none" stroke="#ffd54f" stroke-width=".5" style="animation-delay:5s"/>

<!-- Orbit rings -->
<circle class="orbit-r or1" cx="270" cy="440" r="60" stroke="#0f3844" stroke-width=".7" stroke-dasharray="4 6"/>
<circle class="orbit-r or2" cx="270" cy="440" r="76" stroke="#0f3844" stroke-width=".45" stroke-dasharray="2 8"/>
<circle class="orbit-r or3" cx="270" cy="440" r="92" stroke="#0f3844" stroke-width=".3" stroke-dasharray="1 10"/>

<!-- Hub core -->
<g transform="translate(270, 440)">
  <g class="hub-pop">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#ffd54f" stroke-width="1.2" opacity=".45"/>
    <circle cx="0" cy="0" r="35" fill="#0b2228" stroke="#ffd54f" stroke-width="1.8"/>
    <g class="hub-rot">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#ffd54f" stroke-width=".4" stroke-dasharray="7 10" opacity=".35"/>
      <line x1="-17" y1="0" x2="17" y2="0" stroke="#ffd54f" stroke-width=".4" opacity=".25"/>
      <line x1="0" y1="-17" x2="0" y2="17" stroke="#ffd54f" stroke-width=".4" opacity=".25"/>
      <rect x="-30" y="-30" width="8" height="8" rx="1" fill="none" stroke="#ffd54f" stroke-width=".4" opacity=".2"/>
      <rect x="22" y="-30" width="8" height="8" rx="1" fill="none" stroke="#ffd54f" stroke-width=".4" opacity=".2"/>
      <rect x="-30" y="22" width="8" height="8" rx="1" fill="none" stroke="#ffd54f" stroke-width=".4" opacity=".2"/>
      <rect x="22" y="22" width="8" height="8" rx="1" fill="none" stroke="#ffd54f" stroke-width=".4" opacity=".2"/>
    </g>
    <!-- DB icon -->
    <ellipse cx="0" cy="-7" rx="12" ry="5" fill="none" stroke="#ffd54f" stroke-width="1.3"/>
    <path d="M -12 -7 L -12 7 C -12 11, 12 11, 12 7 L 12 -7" fill="none" stroke="#ffd54f" stroke-width="1.3"/>
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="none" stroke="#ffd54f" stroke-width=".6" opacity=".35"/>
    <circle cx="0" cy="0" r="1.8" fill="#ffd54f"/>
  </g>
</g>

<!-- Hub label -->
<g class="tv tv3">
  <text x="270" y="500" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#ffd54f" font-weight="500" letter-spacing="2">SINGLE SOURCE OF TRUTH</text>
</g>

<!-- ═══════════════════════════════════
     NODE 1 — CRM (95, 240)
     ═══════════════════════════════════ -->
<g transform="translate(95, 240)">
  <g class="node-pop n-crm">
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#ff6b8a" stroke-width=".7"/>
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#ff6b8a" stroke-width=".4"/>
    <circle cx="0" cy="0" r="22" fill="#091a1f" stroke="#ff6b8a" stroke-width="1.3"/>
    <!-- Person icon -->
    <circle cx="0" cy="-5" r="4.5" fill="none" stroke="#ff6b8a" stroke-width="1.1"/>
    <path d="M -8 9 C -8 2, 8 2, 8 9" fill="none" stroke="#ff6b8a" stroke-width="1.1"/>
    <text x="0" y="34" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="9" fill="#ff6b8a" font-weight="600" letter-spacing="1.2">CRM</text>
    <text x="0" y="45" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="6.5" fill="#4db6ac" font-weight="300" letter-spacing=".8">Customer Data</text>
  </g>
</g>

<!-- ═══════════════════════════════════
     NODE 2 — EdTech (445, 270)
     ═══════════════════════════════════ -->
<g transform="translate(445, 270)">
  <g class="node-pop n-ed">
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#b388ff" stroke-width=".7"/>
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#b388ff" stroke-width=".4"/>
    <circle cx="0" cy="0" r="22" fill="#091a1f" stroke="#b388ff" stroke-width="1.3"/>
    <!-- Grad cap -->
    <path d="M -9 2 L 0 -5 L 9 2 L 0 5 Z" fill="none" stroke="#b388ff" stroke-width="1.1"/>
    <line x1="9" y1="2" x2="9" y2="8" stroke="#b388ff" stroke-width="1.1"/>
    <path d="M -5 3 L -5 8 C -5 10.5, 5 10.5, 5 8 L 5 3" fill="none" stroke="#b388ff" stroke-width=".9"/>
    <text x="0" y="34" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="9" fill="#b388ff" font-weight="600" letter-spacing="1.2">EDTECH</text>
    <text x="0" y="45" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="6.5" fill="#4db6ac" font-weight="300" letter-spacing=".8">Learning Data</text>
  </g>
</g>

<!-- ═══════════════════════════════════
     NODE 3 — Factory (85, 640)
     ═══════════════════════════════════ -->
<g transform="translate(85, 640)">
  <g class="node-pop n-fac">
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#ffab40" stroke-width=".7"/>
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#ffab40" stroke-width=".4"/>
    <circle cx="0" cy="0" r="22" fill="#091a1f" stroke="#ffab40" stroke-width="1.3"/>
    <!-- Gear -->
    <circle cx="0" cy="0" r="7" fill="none" stroke="#ffab40" stroke-width="1.1"/>
    <circle cx="0" cy="0" r="3" fill="#ffab40" opacity=".4"/>
    <g stroke="#ffab40" stroke-width="1.1">
      <line x1="0" y1="-10" x2="0" y2="-5.5"/><line x1="0" y1="5.5" x2="0" y2="10"/>
      <line x1="-10" y1="0" x2="-5.5" y2="0"/><line x1="5.5" y1="0" x2="10" y2="0"/>
      <line x1="-7" y1="-7" x2="-4" y2="-4"/><line x1="4" y1="4" x2="7" y2="7"/>
      <line x1="7" y1="-7" x2="4" y2="-4"/><line x1="-4" y1="4" x2="-7" y2="7"/>
    </g>
    <text x="0" y="34" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="9" fill="#ffab40" font-weight="600" letter-spacing="1.2">FACTORY</text>
    <text x="0" y="45" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="6.5" fill="#4db6ac" font-weight="300" letter-spacing=".8">Automation Data</text>
  </g>
</g>

<!-- ═══════════════════════════════════
     NODE 4 — Waste (455, 660)
     ═══════════════════════════════════ -->
<g transform="translate(455, 660)">
  <g class="node-pop n-wst">
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#69f0ae" stroke-width=".7"/>
    <circle class="node-ring" cx="0" cy="0" r="26" fill="none" stroke="#69f0ae" stroke-width=".4"/>
    <circle cx="0" cy="0" r="22" fill="#091a1f" stroke="#69f0ae" stroke-width="1.3"/>

    <path d="M 5.5 -3 L 5.5 4 L 1 8" fill="none" stroke="#69f0ae" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 1 8 L -5.5 4 L -5.5 -3" fill="none" stroke="#69f0ae" stroke-width="1.1" stroke-linecap="round"/>
    <polygon points="5.5,-4.5 8,-1.5 4.5,-.5" fill="#69f0ae" opacity=".7"/>
    <polygon points="1.5,9.5 -1.5,6.5 1.5,6.5" fill="#69f0ae" opacity=".7"/>
    <polygon points="-6.5,-2 -3.5,-3.5 -3.5,-.5" fill="#69f0ae" opacity=".7"/>
    <text x="0" y="34" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="9" fill="#69f0ae" font-weight="600" letter-spacing="1.2">WASTE</text>
    <text x="0" y="45" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="6.5" fill="#4db6ac" font-weight="300" letter-spacing=".8">Smart Sorting</text>
  </g>
</g>

<!-- ═══════════════════════════════════
     BOTTOM — description + stats
     ═══════════════════════════════════ -->
<g class="tv tv4">
  <line x1="160" y1="740" x2="380" y2="740" stroke="#0f3844" stroke-width=".6"/>
</g>

<g class="tv tv4">
  <text x="270" y="770" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="10.5" fill="#80cbc4" font-weight="300" letter-spacing=".4">
    <tspan x="270" dy="0">Integrate CRM, EdTech, factory automation</tspan>
    <tspan x="270" dy="15">and smart waste into a unified ecosystem.</tspan>
    <tspan x="270" dy="15">One source of truth. Zero fragmentation.</tspan>
  </text>
</g>

<!-- Stats -->
<g class="tv tv5">
  <g transform="translate(100, 840)">
    <text class="stat-glow" x="0" y="0" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#00e5ff" font-weight="500">100%</text>
    <text x="0" y="15" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="7" fill="#4db6ac" font-weight="300" letter-spacing="1.2">DATA UNIFIED</text>
  </g>
  <g transform="translate(270, 840)">
    <text class="stat-glow" x="0" y="0" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#ffd54f" font-weight="500">1</text>
    <text x="0" y="15" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="7" fill="#4db6ac" font-weight="300" letter-spacing="1.2">SOURCE OF TRUTH</text>
  </g>
  <g transform="translate(440, 840)">
    <text class="stat-glow" x="0" y="0" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#69f0ae" font-weight="500">0</text>
    <text x="0" y="15" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="7" fill="#4db6ac" font-weight="300" letter-spacing="1.2">FRAGMENTED DATA</text>
